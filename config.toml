# vault-cleaner configuration.
# Rule thresholds (top-N per slot, score floors, archetype weights, set
# bonuses) land here as M2–M4 arrive — see PLAN.md.

# Ghosts have no config: shells carry no quality signal (mods move freely,
# rank columns are empty in current exports, Collections lets you reacquire).
# The ghost pass keeps only equipped / locked / tagged / in-a-loadout shells
# and junks the rest — lock or tag a shell in DIM to keep it.

[armor]
# Scores live on the Total (Base) scale (~60-100 for tier-5 armor): a
# weighted archetype score equals what Total (Base) would read if the
# piece matched the archetype's priorities perfectly.
top_n_per_slot = 5   # per class per slot, always kept
score_floor = 65     # junk only below this AND outside the top-N
set_bonus = 10       # score bonus for pieces carrying a favored set perk
# Set perk names as they appear in the DIM export's Perks columns,
# e.g. ["Erebos Glance"]
favored_set_perks = []

# Close-dupe pass (review-only, never junk): two pieces of the same Hash +
# Tier count as "similar" when no base stat differs by more than
# max_stat_delta AND the deltas sum to at most max_total_delta. Measured on
# a real export the pairs are bimodal — identical rolls (usually differing
# only in Tuning Stat) or a whole archetype apart — so any cap from 1-9 /
# 1-19 selects the same pairs; these sit mid-dead-zone.
[armor.close_dupes]
max_stat_delta = 5
max_total_delta = 12

# Melee-primary Titan builds first (PLAN.md goals). Add more archetype
# tables for other builds; a piece takes its best score across all of them.
[armor.archetypes.melee_primary]
weights = { melee = 3.0, health = 1.5, class = 1.0, grenade = 1.0, super = 0.5, weapons = 0.5 }

# A `top_stats = N` archetype (generic spike) also exists, but is NOT a
# default: measured on a real export, every Armor 3.0 tier-5 piece carries
# the same fixed 30+25 spike, so it scores everything identically (165) and
# discriminates nothing. Only useful for scoring legacy (pre-3.0) armor.

[rails]
# Crafted weapons at/above this level are hard-protected (never junked).
# Locked and exotic items are soft rails: never tagged junk, but flagged
# with a #vc-review note when a dupe pass finds a better copy.
crafted_level_protect = 10

[paths]
input_dir = "data/in"
output_dir = "data/out"
wishlist_cache_dir = "wishlists"
manifest_cache_dir = "data/cache"

[manifest]
# The Bungie manifest supplies the perk name->hash map (~200MB download,
# reduced to a ~1MB cache). Past this age the small index endpoint is
# re-checked; the big file is only re-fetched when the version changed.
max_age_days = 30

[wishlists]
# Cached copies live in wishlist_cache_dir; re-downloaded when older than
# this (or with `vault-cleaner wishlists --refresh`).
max_age_days = 7

[wishlists.sources]
# choosy_voltron: community god/recommended rolls + thumbs-down trash entries
choosy_voltron = "https://raw.githubusercontent.com/48klocs/dim-wish-list-sources/master/choosy_voltron.txt"
# Aegis PvE endgame tierlist, auto-generated DIM wishlist (trait columns only)
aegis = "https://raw.githubusercontent.com/Nitaraku/dim-wishlists/main/aegis_wishlist.txt"
# Aegis trash list: whole-item trash entries for weapons rated D tier or
# lower (updates less often than the lists above)
aegis_trash = "https://raw.githubusercontent.com/Ciceron14/dim-extra-wishlists/main/Aegis%20Spreadsheets%20Wishlists/Aegis%20Endgame%20Analysis/dim_aegis_endgame-trashlist.txt"
